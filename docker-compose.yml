services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mlops-api
    depends_on:
      mlflow:
        condition: service_started
    environment:
      TZ: ${TZ:-Asia/Seoul}
      APP_NAME: ${APP_NAME:-MLOps API}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      APP_ENV: ${APP_ENV:-local}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Seoul}
      ENABLE_DOCS: ${ENABLE_DOCS:-true}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      LOG_TO_FILE: ${LOG_TO_FILE:-false}
      LOG_FILE_PATH: ${LOG_FILE_PATH:-logs/app.log}
      LOG_RETENTION_DAYS: ${LOG_RETENTION_DAYS:-30}
      APP_DATABASE_URL: postgresql://${APP_DB_USER:-app}:${APP_DB_PASSWORD:-app_pass}@app-db:5432/${APP_DB_NAME:-app}
      PREDICTION_LOG_STORE: ${PREDICTION_LOG_STORE:-in_memory}
      TRAINING_JOB_STORE: ${TRAINING_JOB_STORE:-in_memory}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow:5000}
      MLFLOW_EXPERIMENT: ${MLFLOW_EXPERIMENT:-default-model-serving}
      MODEL_CHAMPION_ALIAS: ${MODEL_CHAMPION_ALIAS:-champion}
      MODEL_CANDIDATE_ALIAS: ${MODEL_CANDIDATE_ALIAS:-candidate}
      MLOPS_MIN_VALIDATION_SAMPLES: ${MLOPS_MIN_VALIDATION_SAMPLES:-100}
      MLOPS_MAX_MAPE_FOR_PROMOTION: ${MLOPS_MAX_MAPE_FOR_PROMOTION:-15.0}
      MLOPS_METRIC_FOR_PROMOTION: ${MLOPS_METRIC_FOR_PROMOTION:-rmse}
      MLOPS_ENABLE_SCHEDULED_RETRAINING: ${MLOPS_ENABLE_SCHEDULED_RETRAINING:-false}
      MLOPS_SCHEDULED_RETRAINING_JOBS: "${MLOPS_SCHEDULED_RETRAINING_JOBS:-[]}"
    ports:
      - "${API_PORT:-8000}:8000"
    restart: unless-stopped

  app-db:
    image: postgres:16-alpine
    container_name: mlops-app-db
    profiles:
      - postgres-logs
    environment:
      TZ: ${TZ:-Asia/Seoul}
      POSTGRES_DB: ${APP_DB_NAME:-app}
      POSTGRES_USER: ${APP_DB_USER:-app}
      POSTGRES_PASSWORD: ${APP_DB_PASSWORD:-app_pass}
    volumes:
      - app_db_data:/var/lib/postgresql/data
    ports:
      - "${APP_DB_PORT:-5434}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${APP_DB_USER:-app} -d ${APP_DB_NAME:-app}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mlflow-db:
    image: postgres:16-alpine
    container_name: mlops-mlflow-db
    environment:
      TZ: ${TZ:-Asia/Seoul}
      POSTGRES_DB: ${MLFLOW_DB_NAME:-mlflow}
      POSTGRES_USER: ${MLFLOW_DB_USER:-mlflow}
      POSTGRES_PASSWORD: ${MLFLOW_DB_PASSWORD:-mlflow_pass}
    volumes:
      - mlflow_db_data:/var/lib/postgresql/data
    ports:
      - "${MLFLOW_DB_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MLFLOW_DB_USER:-mlflow} -d ${MLFLOW_DB_NAME:-mlflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: mlops-minio
    command: server /data --console-address ":9001"
    environment:
      TZ: ${TZ:-Asia/Seoul}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    container_name: mlops-minio-init
    environment:
      TZ: ${TZ:-Asia/Seoul}
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin123};
      mc mb --ignore-existing local/${MLFLOW_ARTIFACT_BUCKET:-mlflow-artifacts};
      mc anonymous set none local/${MLFLOW_ARTIFACT_BUCKET:-mlflow-artifacts};
      "
    restart: "no"

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.0.0
    container_name: mlops-mlflow
    depends_on:
      mlflow-db:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      TZ: ${TZ:-Asia/Seoul}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    command:
      - /bin/sh
      - -c
      - >
        pip install --no-cache-dir psycopg2-binary boto3 &&
        mlflow server
        --host 0.0.0.0
        --port 5000
        --backend-store-uri postgresql://${MLFLOW_DB_USER:-mlflow}:${MLFLOW_DB_PASSWORD:-mlflow_pass}@mlflow-db:5432/${MLFLOW_DB_NAME:-mlflow}
        --artifacts-destination s3://${MLFLOW_ARTIFACT_BUCKET:-mlflow-artifacts}
        --serve-artifacts
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    restart: unless-stopped

volumes:
  app_db_data:
  mlflow_db_data:
  minio_data:
